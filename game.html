<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Игровой виджет</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: transparent;
      font-family: Arial, sans-serif;
      position: relative;
    }

    #gameContainer {
      width: 100%;
      height: 100%;
      position: relative;
      background: transparent;
      overflow: hidden;
    }

    .element {
      width: 80px;
      height: 80px;
      position: absolute;
      cursor: pointer;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation-name: falling;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      user-select: none;
      -webkit-user-select: none;
    }

    @keyframes falling {
      from {
        transform: translateY(-100px);
      }
      to {
        transform: translateY(100vh);
      }
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
    }

    #modal.active {
      display: flex;
      pointer-events: auto;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    .question {
      font-weight: bold;
      margin-bottom: 15px;
      color: #222;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
      user-select: none;
      -webkit-user-select: none;
    }

    .option:hover {
      background: #eef;
    }

    .option.correct {
      background: #4caf50;
      color: white;
      border-color: #4caf50;
    }

    .option.incorrect {
      background: #f44336;
      color: white;
      border-color: #f44336;
    }

    .option.continue-btn {
      background: #4caf50;
      color: white;
      text-align: center;
      font-weight: bold;
      border-color: #4caf50;
    }

    .option.continue-btn:hover {
      background: #43a047;
    }

    #score {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.4);
      color: gold;
      font-weight: bold;
      font-size: 20px;
      padding: 8px 12px;
      border-radius: 10px;
      z-index: 1000;
      user-select: none;
      -webkit-user-select: none;
      transition: all 1.5s ease;
    }

    #endScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 2000;
    }

    #endScreen.active {
      display: flex;
    }

    #endScreen .end-score {
      color: gold;
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      animation: scaleIn 1.5s ease forwards;
    }

    #endScreen .end-text {
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 5px #000;
    }

    @keyframes scaleIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer"></div>
  <div id="score">💰 0</div>

  <div id="modal">
    <div class="modal-content" role="dialog" aria-modal="true">
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>
  </div>

  <div id="endScreen">
    <div class="end-score" id="endScore"></div>
    <div class="end-text" id="endText"></div>
  </div>

  <script>
    // Звуки
    function playSound(type) {
      var AudioCtx = window.AudioContext || window.webkitAudioContext;
      var audioCtx = new AudioCtx();
      var osc = audioCtx.createOscillator();
      var gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      if (type === 'click') {
        osc.frequency.value = 800;
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.1
        );
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'correct') {
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.3
        );
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'end') {
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.15);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.6
        );
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.6);
      }
    }

    // Парсим из URL
    var urlParams = new URLSearchParams(window.location.search);
    var questions = [];
    var elementUrl = '';
    try {
      var q = urlParams.get('questions');
      if (q) questions = JSON.parse(decodeURIComponent(q));
    } catch (e) {
      console.error('Ошибка разбора вопросов:', e);
    }
    elementUrl = urlParams.get('element') || '';

    // Клонируем массив вопросов
    var questionsToAsk = questions.slice();

    var gameContainer = document.getElementById('gameContainer');
    var modal = document.getElementById('modal');
    var questionText = document.getElementById('questionText');
    var optionsContainer = document.getElementById('optionsContainer');
    var scoreEl = document.getElementById('score');
    var endScreen = document.getElementById('endScreen');
    var endScore = document.getElementById('endScore');
    var endText = document.getElementById('endText');

    var score = 0;
    var currentQuestion = null;
    var answered = false;
    var gameEnded = false;
    var fallIntervalId;

    // Создаём падающий элемент
    function createElement() {
      if (gameEnded) return;
      if (!elementUrl || questionsToAsk.length === 0) {
        if (!gameEnded) endGame();
        return;
      }

      var el = document.createElement('div');
      el.className = 'element';
      el.style.backgroundImage = "url('" + elementUrl + "')";

      var left = Math.random() * (window.innerWidth - 80);
      el.style.left = left + 'px';

      var duration = 7000 + Math.random() * 3000;
      el.style.animationDuration = duration + 'ms';

      el.addEventListener('click', function (e) {
        e.stopPropagation();
        if (modal.classList.contains('active')) return;
        playSound('click');
        currentQuestion =
          questionsToAsk[
            Math.floor(Math.random() * questionsToAsk.length)
          ];
        showModal(currentQuestion);
        el.remove();
      });

      gameContainer.appendChild(el);

      setTimeout(function () {
        if (el.parentNode) el.remove();
      }, duration);
    }

    // Показ модального окна с вопросом
    function showModal(question) {
      answered = false;
      questionText.textContent = question.question;
      optionsContainer.innerHTML = '';

      if (question.type === 'quiz') {
        // С вариантами ответа
        question.options.forEach(function (option, idx) {
          var btn = document.createElement('div');
          btn.className = 'option';
          btn.textContent = option;
          btn.onclick = function () {
            checkAnswer(idx, btn, question.correct, question);
          };
          optionsContainer.appendChild(btn);
        });
      } else {
        // Простой вопрос без вариантов
        var btn = document.createElement('div');
        btn.className = 'option continue-btn';
        btn.textContent = 'Продолжить';
        btn.onclick = function () {
          if (answered) return;
          answered = true;
          playSound('correct');
          score++;
          scoreEl.textContent = '💰 ' + score;

          // Удаляем вопрос из списка
          var indexToRemove = questionsToAsk.indexOf(question);
          if (indexToRemove !== -1)
            questionsToAsk.splice(indexToRemove, 1);

          setTimeout(function () {
            modal.classList.remove('active');
            if (questionsToAsk.length === 0) {
              endGame();
            }
          }, 300);
        };
        optionsContainer.appendChild(btn);
      }

      modal.classList.add('active');
    }

    // Проверка ответа (для quiz)
    function checkAnswer(selected, btn, correct, question) {
      if (answered) return;
      answered = true;

      if (selected === correct) {
        btn.classList.add('correct');
        score++;
        scoreEl.textContent = '💰 ' + score;
        playSound('correct');

        // Удаляем вопрос
        var indexToRemove = questionsToAsk.indexOf(question);
        if (indexToRemove !== -1)
          questionsToAsk.splice(indexToRemove, 1);
      } else {
        btn.classList.add('incorrect');
        var children = optionsContainer.children;
        if (children[correct])
          children[correct].classList.add('correct');
      }

      setTimeout(function () {
        modal.classList.remove('active');
        if (questionsToAsk.length === 0) {
          endGame();
        }
      }, 2000);
    }

    // Конец игры
    function endGame() {
      gameEnded = true;
      clearInterval(fallIntervalId);

      // Убираем все падающие элементы
      gameContainer.innerHTML = '';

      // Скрываем счёт сверху
      scoreEl.style.display = 'none';

      // Показываем финальный экран
      playSound('end');
      endScore.textContent = '💰 ' + score;
      endText.textContent =
        'Игра окончена! Твой результат: ' +
        score +
        ' из ' +
        questions.length;
      endScreen.classList.add('active');
    }

    // Стартуем интервал падающих элементов
    fallIntervalId = setInterval(createElement, 3000);
    createElement();
  </script>
</body>
</html>
