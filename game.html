<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Игровой виджет</title>
  <style>
    body, html {
      margin: 0; padding: 0; overflow: hidden;
      width: 100vw; height: 100vh;
      background: transparent;
      font-family: Arial, sans-serif;
      position: relative;
    }
    #gameContainer {
      width: 100%; height: 100%;
      position: relative;
      background: transparent;
      overflow: hidden;
    }
    .element {
      width: 80px;
      height: 80px;
      position: absolute;
      cursor: pointer;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation-name: falling;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      user-select: none;
      -webkit-user-select: none;
    }
    @keyframes falling {
      from { transform: translateY(-100px); }
      to { transform: translateY(100vh); }
    }

    /* Модальное окно */
    #modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none; /* Блокируем клики когда закрыто */
    }

    #modal.active {
      display: flex;
      pointer-events: auto; /* Разрешаем клики когда открыто */
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }
    .question {
      font-weight: bold;
      margin-bottom: 15px;
      color: #222;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
      user-select: none;
      -webkit-user-select: none;
    }
    .option:hover {
      background: #eef;
    }
    .option.correct {
      background: #4caf50;
      color: white;
      border-color: #4caf50;
    }
    .option.incorrect {
      background: #f44336;
      color: white;
      border-color: #f44336;
    }
    #score {
      position: fixed;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.4);
      color: gold;
      font-weight: bold;
      font-size: 20px;
      padding: 8px 12px;
      border-radius: 10px;
      z-index: 1000;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
  <div id="gameContainer"></div>
  <div id="score">💰 0</div>

  <div id="modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="questionText">
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>
  </div>

<script>
  // Функция для проигрывания звуков
  function playSound(type) {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.value = 800;
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // Парсим параметры questions и element из URL
  const urlParams = new URLSearchParams(window.location.search);
  let questions = [];
  let elementUrl = '';
  try {
    const q = urlParams.get('questions');
    if (q) questions = JSON.parse(decodeURIComponent(q));
  } catch(e) {
    console.error('Ошибка разбора вопросов:', e);
  }
  elementUrl = urlParams.get('element') || '';

  const gameContainer = document.getElementById('gameContainer');
  const modal = document.getElementById('modal');
  const questionText = document.getElementById('questionText');
  const optionsContainer = document.getElementById('optionsContainer');
  const scoreEl = document.getElementById('score');

  let score = 0;
  let currentQuestion = null;
  let answered = false;

  // Создаем падающий элемент
  function createElement() {
    if (!elementUrl || questions.length === 0) return;

    const el = document.createElement('div');
    el.className = 'element';
    el.style.backgroundImage = `url('${elementUrl}')`;

    const left = Math.random() * (window.innerWidth - 80);
    el.style.left = left + 'px';

    const duration = 7000 + Math.random() * 3000;
    el.style.animationDuration = duration + 'ms';

    el.addEventListener('click', e => {
      e.stopPropagation();
      if (modal.classList.contains('active')) return;
      playSound('click');  // звук при клике на гифку
      currentQuestion = questions[Math.floor(Math.random() * questions.length)];
      showModal(currentQuestion);
      el.remove();
    });

    gameContainer.appendChild(el);

    // Удалить элемент после анимации, если не кликнули
    setTimeout(() => {
      if (el.parentNode) el.remove();
    }, duration);
  }

  // Показ модального окна с вопросом
  function showModal(question) {
    answered = false;
    questionText.textContent = question.question;
    optionsContainer.innerHTML = '';
    modal.classList.add('active');

    question.options.forEach((option, idx) => {
      const btn = document.createElement('div');
      btn.className = 'option';
      btn.textContent = option;
      btn.onclick = () => checkAnswer(idx, btn, question.correct);
      optionsContainer.appendChild(btn);
    });
  }

  // Проверка ответа
  function checkAnswer(selected, btn, correct) {
    if (answered) return;
    answered = true;

    if (selected === correct) {
      btn.classList.add('correct');
      score++;
      scoreEl.textContent = `💰 ${score}`;
      playSound('correct'); // звук при правильном ответе
    } else {
      btn.classList.add('incorrect');
      const children = optionsContainer.children;
      if (children[correct]) children[correct].classList.add('correct');
    }

    setTimeout(() => {
      modal.classList.remove('active');
    }, 2000);
  }

  // Периодически создаем падающие элементы
  setInterval(createElement, 3000);
  createElement();
</script>
</body>
</html>
